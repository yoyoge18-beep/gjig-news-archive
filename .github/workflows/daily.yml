name: 매일 뉴스 수집 및 배포

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 8시 KST (UTC 23:00)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install feedparser requests

      - name: 뉴스 수집
        id: fetch
        run: |
          OUTPUT=$(python3 fetcher.py 2>&1)
          echo "$OUTPUT"
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 정적 사이트 빌드
        id: build
        run: |
          OUTPUT=$(python3 build.py 2>&1)
          echo "$OUTPUT"
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: news.db 커밋 (변경 시)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.db
          git diff --staged --quiet || git commit -m "자동수집: $(date '+%Y-%m-%d %H:%M KST' -d '+9 hours')"
          git push origin main

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          commit_message: "배포: ${{ github.run_id }}"

      - name: 결과 이메일 발송
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: yoyoge18@gmail.com
          from: 대학 기사 아카이브 <${{ secrets.GMAIL_USERNAME }}>
          subject: "[기사아카이브] ${{ github.run_id }} 수집 완료 — $(date '+%Y-%m-%d' -d '+9 hours')"
          convert_markdown: true
          body: |
            ## 대학 기사 아카이브 — 오늘의 수집 결과

            **실행 일시:** ${{ github.event.repository.updated_at }}
            **사이트:** https://yoyoge18-beep.github.io/gjig-news-archive/

            ---

            ### 뉴스 수집 결과
            ```
            ${{ steps.fetch.outputs.result }}
            ```

            ### 빌드 결과
            ```
            ${{ steps.build.outputs.result }}
            ```

            ---
            [Actions 로그 보기](https://github.com/yoyoge18-beep/gjig-news-archive/actions/runs/${{ github.run_id }})
